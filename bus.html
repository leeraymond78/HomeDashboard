<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <script>
    (function () {
      try {
        var t = localStorage.getItem('homedashboard-theme');
        if (t === 'lcd' || t === 'dark') {
          document.documentElement.dataset.theme = t;
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.content = t === 'lcd' ? '#b8c4ae' : '#000000';
        }
      } catch (e) {}
    })();
  </script>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>路線詳細</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bus-detail-page">
  <header class="bus-detail-header">
    <nav class="page-nav page-nav--back bus-detail-nav">
      <a id="back-link" class="page-nav-link page-nav-link--back" href="./">
        <svg class="page-nav-back-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        戻る
      </a>
      <div class="bus-detail-actions">
        <button id="timetable-btn" class="page-nav-link bus-detail-action-btn" type="button" hidden aria-haspopup="dialog" aria-expanded="false" aria-controls="bus-timetable-dialog">
          時刻表
        </button>
        <button id="flip-bound-btn" class="page-nav-link bus-detail-action-btn" type="button" hidden>
          方向切替
        </button>
      </div>
    </nav>
    <h1 id="bus-title" class="bus-detail-title">読み込み中…</h1>
  </header>

  <div class="bus-map-wrap">
    <div id="bus-map" class="bus-map" aria-hidden="true"></div>
    <button id="bus-locate-btn" class="bus-map-locate-btn" type="button" aria-label="現在地" title="現在地" hidden>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
      </svg>
    </button>
  </div>

  <main id="bus-stops" class="bus-stops" aria-live="polite">
    <div class="loading">読み込み中…</div>
  </main>

  <footer class="refresh-bar">
    <span id="refresh-timer" class="refresh-timer">0s</span>
    <button id="refresh-btn" class="refresh-btn" type="button" aria-label="更新">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
      </svg>
    </button>
  </footer>

  <dialog id="bus-timetable-dialog" class="bus-timetable-dialog" aria-labelledby="bus-timetable-title">
    <div class="bus-timetable-sheet">
      <div class="bus-timetable-panel-head">
        <div class="bus-timetable-panel-titles">
          <h2 id="bus-timetable-title" class="bus-timetable-title">時刻表</h2>
          <span id="bus-timetable-subtitle" class="bus-timetable-subtitle"></span>
        </div>
        <button type="button" class="bus-timetable-close" data-timetable-close aria-label="閉じる">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div id="bus-timetable-body" class="bus-timetable-body"></div>
    </div>
  </dialog>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="js/register-sw.js"></script>
  <script src="js/bus.js" type="module"></script>
</body>
</html>
