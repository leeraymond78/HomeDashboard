<!DOCTYPE html>
<html lang="ja" data-max-etas="6" data-page-title="app.title">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="バス・小巴・接駁・天気。ゴールドコースト周辺の出かけ情報">
  <meta name="theme-color" content="#000000">
  <script>
    (function () {
      try {
        var l = localStorage.getItem('homedashboard-locale');
        if (l === 'en' || l === 'ja') {
          document.documentElement.lang = l;
          document.documentElement.dataset.locale = l;
        }
        var t = localStorage.getItem('homedashboard-theme');
        if (t === 'lcd' || t === 'dark') {
          document.documentElement.dataset.theme = t;
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.content = t === 'lcd' ? '#b8c4ae' : '#000000';
        }
      } catch (e) {}
    })();
  </script>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ゴールドコースト">
  <meta name="mobile-web-app-capable" content="yes">
  <title>ゴールドコースト</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <section id="weather-section" class="weather-section" aria-live="polite"></section>
  <section id="traffic-section" class="traffic-section" aria-live="polite"></section>

  <div id="location-prompt" class="location-prompt" hidden>
    <button id="location-prompt-btn" type="button" class="location-prompt-btn" data-i18n="location.prompt">
      近くの停留所を表示（位置情報を許可）
    </button>
  </div>

  <main id="groups" class="groups" aria-live="polite"></main>

  <div class="route-search-bar">
    <a href="search.html" class="route-search-open-btn" data-i18n="search.open">
      バス番号で検索
    </a>
  </div>

  <footer class="refresh-bar">
    <button id="locale-btn" type="button" class="theme-btn" aria-pressed="false">EN</button>
    <button id="theme-btn" type="button" class="theme-btn" aria-pressed="false">LCD</button>
    <span id="refresh-timer" class="refresh-timer">0s</span>
    <button id="refresh-btn" class="refresh-btn" type="button" data-i18n-aria="refresh">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
      </svg>
    </button>
  </footer>

  <span id="build-stamp" class="build-stamp" data-build="0" aria-hidden="true"></span>

  <script src="js/register-sw.js"></script>
  <script src="js/app.js" type="module"></script>
</body>
</html>
