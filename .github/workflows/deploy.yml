name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write build info
        run: |
          BUILD="${{ github.run_number }}"
          printf '{"build":%s}\n' "$BUILD" > build-info.json
          test -f build-info.json
          cat build-info.json
          sed -i "s/data-build=\"0\"/data-build=\"$BUILD\"/" index.html

      - name: Verify build artifact
        run: |
          test -f build-info.json
          grep -q "\"build\":" build-info.json
          grep -q "data-build=\"${{ github.run_number }}\"" index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        timeout-minutes: 10
